  <script>
(function blockDistractingSites() {
  // Define blocked domains
  const blockedSites = [
    /youtube\.com/i,
    /youtu\.be/i,
    /instagram\.com/i,
    /facebook\.com/i,
    /twitter\.com/i,
    /tiktok\.com/i,
    /reddit\.com/i
  ];

  // Function to check and block links
  document.addEventListener("click", (event) => {
    const link = event.target.closest("a");
    if (link && blockedSites.some(rx => rx.test(link.href))) {
      event.preventDefault();
      alert("🚫 This site is blocked for your focus session!");
    }
  }, true);

  // Prevent scripts on your page from opening new tabs
  const originalOpen = window.open;
  window.open = function (url, ...args) {
    if (blockedSites.some(rx => rx.test(url))) {
      alert("🚫 Blocked: " + url);
      return null;
    }
    return originalOpen.apply(window, [url, ...args]);
  };

  console.log("Focus mode active — distracting sites blocked on this page!");
})();
</script>
